<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BotTele2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════
       CUSTOMIZE THESE VARIABLES
    ═══════════════════════════════════════════ */
    :root {
      --accent:     #9d7dff;      /* main purple */
      --accent2:    #c084fc;      /* secondary purple */
      --bg:         #080810;      /* page background */
      --card:       #0e0e1c;      /* card background */
      --border:     #1a1a30;      /* border color */
      --text:       #d4d4f0;      /* main text */
      --muted:      #44446a;      /* muted text */
      --name:       BotTele2;     /* your name (used in JS) */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      overflow-x: hidden;
    }

    /* ── Animated background ──────────────────── */
    #bg-canvas {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
    }

    /* ── Grain overlay ────────────────────────── */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
    }

    /* ── Layout ───────────────────────────────── */
    .wrap {
      position: relative; z-index: 2;
      max-width: 480px; margin: 0 auto;
      padding: 60px 20px 80px;
      display: flex; flex-direction: column; gap: 18px;
      animation: fadeUp .6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Profile card ─────────────────────────── */
    .profile-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px 24px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      animation: fadeUp .5s ease .1s both;
    }

    .avatar-ring {
      width: 90px; height: 90px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 32px rgba(157,125,255,.35);
    }

    .avatar-ring img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background: var(--bg);
      display: block;
    }

    .profile-name {
      font-family: 'Syne', sans-serif;
      font-size: 26px; font-weight: 800;
      color: #fff; letter-spacing: -0.5px;
      text-align: center;
    }

    .profile-tag {
      font-size: 11px; color: var(--accent);
      letter-spacing: 2px; text-transform: uppercase;
      margin-top: -8px;
    }

    .profile-bio {
      font-size: 12px; color: var(--muted);
      text-align: center; line-height: 1.8;
      max-width: 320px;
    }

    /* ── Status badge ─────────────────────────── */
    .status {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(157,125,255,.07);
      border: 1px solid rgba(157,125,255,.15);
      border-radius: 99px; padding: 5px 14px;
      font-size: 11px; color: var(--accent);
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #5bff8f;
      box-shadow: 0 0 8px rgba(91,255,143,.8);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 8px rgba(91,255,143,.8); }
      50%      { box-shadow: 0 0 3px rgba(91,255,143,.2); }
    }

    /* ── Section title ────────────────────────── */
    .section-label {
      font-size: 9px; font-weight: 700; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--muted);
      padding: 0 2px; margin-bottom: -6px;
    }

    /* ── Link cards ───────────────────────────── */
    .links { display: flex; flex-direction: column; gap: 9px; }

    .link-card {
      display: flex; align-items: center; gap: 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 18px;
      text-decoration: none; color: var(--text);
      transition: background .15s, border-color .2s, transform .15s;
      animation: fadeUp .5s ease both;
      cursor: pointer;
    }
    .link-card:hover {
      background: #12121f;
      border-color: var(--accent);
      transform: translateX(4px);
    }
    .link-card:hover .link-arrow { opacity: 1; transform: translateX(0); }

    .link-icon {
      width: 38px; height: 38px; min-width: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .link-text { flex: 1; min-width: 0; }
    .link-name {
      font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 700; color: #fff;
    }
    .link-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }

    .link-arrow {
      opacity: 0; transform: translateX(-4px);
      transition: all .15s; color: var(--accent);
    }

    /* ── Icon color themes ────────────────────── */
    .ic-discord  { background: rgba(88,101,242,.15);  color: #5865f2; }
    .ic-telegram { background: rgba(39,174,239,.15);  color: #27aeef; }
    .ic-roblox   { background: rgba(226,28,28,.12);   color: #e21c1c; }
    .ic-pekora   { background: rgba(157,125,255,.12); color: var(--accent); }
    .ic-namemc   { background: rgba(98,200,98,.12);   color: #62c862; }
    .ic-tiktok   { background: rgba(255,255,255,.06); color: #fff; }
    .ic-youtube  { background: rgba(255,0,0,.12);     color: #ff4444; }
    .ic-twitter  { background: rgba(29,161,242,.12);  color: #1da1f2; }
    .ic-github   { background: rgba(255,255,255,.08); color: #ccc; }
    .ic-steam    { background: rgba(100,149,237,.12); color: #6495ed; }
    .ic-twitch   { background: rgba(145,70,255,.15);  color: #9146ff; }
    .ic-spotify  { background: rgba(30,215,96,.12);   color: #1ed760; }

    /* ── Music player ─────────────────────────── */
    .music-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      animation: fadeUp .5s ease .35s both;
    }

    .music-header {
      font-size: 9px; font-weight: 700; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 14px;
    }

    .music-inner {
      display: flex; gap: 14px; align-items: center;
    }

    .music-art {
      width: 52px; height: 52px; min-width: 52px;
      border-radius: 8px;
      background: #1a1a2e;
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
    }
    .music-art img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .music-art-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .music-art.spinning img, .music-art.spinning .music-art-placeholder {
      animation: spin 8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .music-info { flex: 1; min-width: 0; }
    .music-title {
      font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 700; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .music-artist { font-size: 10px; color: var(--muted); margin-top: 2px; }

    .music-controls {
      display: flex; align-items: center; gap: 8px; margin-top: 14px;
    }

    .music-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: color .15s; padding: 4px;
      border-radius: 6px;
    }
    .music-btn:hover { color: var(--accent); }
    .music-btn.play {
      width: 36px; height: 36px;
      background: var(--accent); color: #fff; border-radius: 50%;
      box-shadow: 0 0 18px rgba(157,125,255,.4);
      transition: background .15s, box-shadow .15s;
    }
    .music-btn.play:hover { background: var(--accent2); box-shadow: 0 0 24px rgba(192,132,252,.5); }

    .music-progress-wrap {
      flex: 1; height: 3px; background: #1a1a2e; border-radius: 9999px;
      cursor: pointer; position: relative; overflow: hidden;
    }
    .music-progress-fill {
      height: 100%; background: var(--accent); border-radius: 9999px;
      width: 0%; transition: width .5s linear;
    }

    .music-time { font-size: 9px; color: var(--muted); min-width: 30px; text-align: right; }

    .music-vol {
      display: flex; align-items: center; gap: 6px; margin-top: 10px;
    }
    .music-vol svg { color: var(--muted); flex-shrink: 0; }
    .music-vol input[type=range] {
      -webkit-appearance: none; flex: 1; height: 3px;
      background: #1a1a2e; border-radius: 9999px; cursor: pointer;
    }
    .music-vol input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 10px; height: 10px;
      border-radius: 50%; background: var(--accent); cursor: pointer;
    }

    /* playlist */
    .playlist { margin-top: 12px; display: flex; flex-direction: column; gap: 4px; }
    .playlist-item {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 10px; border-radius: 8px;
      cursor: pointer; transition: background .15s;
      font-size: 11px; color: var(--muted);
    }
    .playlist-item:hover { background: rgba(255,255,255,.03); color: var(--text); }
    .playlist-item.active { color: var(--accent); }
    .playlist-item.active .pl-idx { color: var(--accent); }
    .pl-idx { width: 16px; text-align: center; font-size: 10px; flex-shrink: 0; }
    .pl-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pl-dur  { font-size: 10px; flex-shrink: 0; }

    /* ── Footer ───────────────────────────────── */
    .footer {
      text-align: center; font-size: 10px; color: #1e1e30;
      margin-top: 8px; letter-spacing: 0.5px;
    }
    .footer a { color: #2a2a48; text-decoration: none; }
    .footer a:hover { color: var(--muted); }

    /* custom cursor */
    * { cursor: none !important; }
    #cursor {
      position: fixed; z-index: 9999;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: transform .08s ease, width .2s, height .2s, opacity .2s;
      box-shadow: 0 0 12px rgba(157,125,255,.7);
      mix-blend-mode: screen;
    }
    #cursor-ring {
      position: fixed; z-index: 9998;
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid rgba(157,125,255,.4);
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: transform .18s ease, width .2s, height .2s;
    }
  </style>
</head>

        <div class="music-progress-fill" id="progress-fill"></div>
      </div>
      <div class="music-time" id="music-time">0:00</div>
    </div>

    <div class="music-vol">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" style="color:var(--muted)">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
      </svg>
      <input type="range" id="vol-slider" min="0" max="100" value="70" />
    </div>
  </div>

  <div class="footer">
    made with 💜 · <a href="https://github.com" target="_blank">github pages</a>
  </div>
</div>


<audio id="audio-el"></audio>

<script>
const PLAYLIST = [
  { title: 'Over My Dead Body', artist: 'Drake', src: 'Over_My_Dead_Body.mp3', art: '' },
];

const audio       = document.getElementById('audio-el');
const btnPlay     = document.getElementById('btn-play');
const btnPrev     = document.getElementById('btn-prev');
const btnNext     = document.getElementById('btn-next');
const iconPlay    = document.getElementById('icon-play');
const iconPause   = document.getElementById('icon-pause');
const progFill    = document.getElementById('progress-fill');
const progWrap    = document.getElementById('progress-wrap');
const musicTime   = document.getElementById('music-time');
const musicTitle  = document.getElementById('music-title');
const musicArtist = document.getElementById('music-artist');
const musicArt    = document.getElementById('music-art');
const artImg      = document.getElementById('art-img');
const artPH       = document.getElementById('art-placeholder');
const volSlider   = document.getElementById('vol-slider');

let currentIdx = 0;
let isPlaying  = false;

function fmt(s) {
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

function loadTrack(idx, autoplay = false) {
  currentIdx = (idx + PLAYLIST.length) % PLAYLIST.length;
  const t = PLAYLIST[currentIdx];
  musicTitle.textContent  = t.title;
  musicArtist.textContent = t.artist;
  if (t.art) { artImg.src = t.art; artImg.style.display = 'block'; artPH.style.display = 'none'; }
  else        { artImg.style.display = 'none'; artPH.style.display = 'flex'; }
  audio.src = t.src; audio.load();
  if (autoplay) audio.play().then(() => setPlaying(true)).catch(() => {});
}

function setPlaying(val) {
  isPlaying = val;
  iconPlay.style.display  = val ? 'none'  : 'block';
  iconPause.style.display = val ? 'block' : 'none';
  musicArt.classList.toggle('spinning', val);
}

btnPlay.addEventListener('click', () => {
  if (isPlaying) { audio.pause(); setPlaying(false); }
  else { audio.play().then(() => setPlaying(true)).catch(() => {}); }
});
btnPrev.addEventListener('click', () => loadTrack(currentIdx - 1, isPlaying));
btnNext.addEventListener('click', () => loadTrack(currentIdx + 1, isPlaying));

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  progFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
  musicTime.textContent = fmt(audio.currentTime);
});
audio.addEventListener('ended', () => loadTrack(currentIdx + 1, true));
progWrap.addEventListener('click', e => {
  if (!audio.duration) return;
  const r = progWrap.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
});
volSlider.addEventListener('input', () => { audio.volume = volSlider.value / 100; });
audio.volume = 0.7;
loadTrack(0);

/* ════════════════════════════════════════════════════
   BACKGROUND PARTICLES
════════════════════════════════════════════════════ */
const canvas = document.getElementById('bg-canvas');
const ctx    = canvas.getContext('2d');
let W, H, stars = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function mkStar() {
  return {
    x:  Math.random() * W,
    y:  Math.random() * H,
    r:  Math.random() * 1.2 + 0.2,
    vx: (Math.random() - .5) * 0.15,
    vy: (Math.random() - .5) * 0.15,
    a:  Math.random(),
  };
}

function initStars() {
  stars = Array.from({ length: 110 }, mkStar);
}

function drawStars() {
  ctx.clearRect(0, 0, W, H);
  for (const s of stars) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(157,125,255,${s.a * 0.6})`;
    ctx.fill();
    s.x += s.vx; s.y += s.vy;
    if (s.x < 0) s.x = W;
    if (s.x > W) s.x = 0;
    if (s.y < 0) s.y = H;
    if (s.y > H) s.y = 0;
  }
  requestAnimationFrame(drawStars);
}

window.addEventListener('resize', () => { resize(); initStars(); });
resize(); initStars(); drawStars();

/* ════════════════════════════════════════════════════
   CUSTOM CURSOR
════════════════════════════════════════════════════ */
const cur  = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
let mx = 0, my = 0, rx = 0, ry = 0;

document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

(function animCursor() {
  cur.style.left = mx + 'px';  cur.style.top = my + 'px';
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
  requestAnimationFrame(animCursor);
})();
</script>
</body>
</html>
